name: daily-leetcode

# Fires at 3:00 PM Pacific year-round.
# GitHub cron is UTC only, so we schedule both possible UTC hours
# (22:00 = 15:00 PDT, 23:00 = 15:00 PST) and a guard step lets only
# the one that is actually 3 PM in America/Los_Angeles proceed.
on:
  schedule:
    - cron: "0 22 * * *" # 15:00 PDT (Mar-Nov)
    - cron: "0 23 * * *" # 15:00 PST (Nov-Mar)
  workflow_dispatch: # manual "Run workflow" button, always proceeds

permissions:
  contents: write # commit state.json back
  issues: write # comment the daily plan

concurrency:
  group: daily-leetcode
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Guard - only proceed at 3 PM Pacific
        id: guard
        run: |
          hour=$(TZ=America/Los_Angeles date +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$hour" = "15" ]; then
            echo "run=yes" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping: it is ${hour}:00 in PT, not 15:00 (DST twin of this cron)."
            echo "run=no" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.guard.outputs.run == 'yes'
        uses: actions/checkout@v4

      - name: Generate today's plan (Pacific date)
        if: steps.guard.outputs.run == 'yes'
        run: |
          PT_DATE=$(TZ=America/Los_Angeles date +%F)
          python3 spaced_repetition/sr.py today --md --date "$PT_DATE" | tee plan.md
          printf '\ncc @%s\n' "${{ github.repository_owner }}" >> plan.md

      - name: Commit updated state.json
        if: steps.guard.outputs.run == 'yes'
        run: |
          if ! git diff --quiet spaced_repetition/state.json 2>/dev/null; then
            git config user.name "sr-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add spaced_repetition/state.json
            git commit -m "sr: record daily plan"
            git pull --rebase origin main
            git push
          else
            echo "state.json unchanged (idempotent rerun) - nothing to commit."
          fi

      - name: Create today's issue (idempotent - edits body on rerun)
        if: steps.guard.outputs.run == 'yes'
        run: |
          PT_DATE=$(TZ=America/Los_Angeles date +%F)
          TITLE="Daily LeetCode $PT_DATE"
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" \
                     --search "\"$TITLE\" in:title" --state all \
                     --json number,title --jq '.[] | "\(.number)\t\(.title)"' \
                     | awk -F'\t' -v t="$TITLE" '$2==t{print $1; exit}')
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --repo "$GITHUB_REPOSITORY" --body-file plan.md
            echo "Updated existing issue #$existing"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" --body-file plan.md
          fi

      - name: Close earlier daily issues
        if: steps.guard.outputs.run == 'yes'
        run: |
          PT_DATE=$(TZ=America/Los_Angeles date +%F)
          TITLE="Daily LeetCode $PT_DATE"
          gh issue list --repo "$GITHUB_REPOSITORY" \
            --search "Daily LeetCode in:title" --state open \
            --json number,title --jq '.[] | "\(.number)\t\(.title)"' \
            | awk -F'\t' -v t="$TITLE" 'index($2,"Daily LeetCode")==1 && $2!=t {print $1}' \
            | while read -r n; do
                gh issue close "$n" --repo "$GITHUB_REPOSITORY" \
                  --comment "Superseded by today's plan. (You can still log solves by commenting here - closed issues work too.)"
              done
